name: Build DLL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build DLL
      run: msbuild MinecraftCheatDLL/MinecraftCheatDLL.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload DLL Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinecraftCheatDLL
        path: MinecraftCheatDLL/x64/Release/MinecraftCheatDLL.dll
